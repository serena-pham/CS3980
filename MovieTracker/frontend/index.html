<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Tracker</title>
 <link rel="stylesheet" href="/static/style.css" />
  <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon" />
</head>
<body>
  <div class="container">
    <h1>Movie Tracker</h1>
    <div class="add-movie-btn-wrap">
      <button class="btn btn-primary btn-add-new" id="add-movie-btn" onclick="openForm()">+ Add New Movie</button>
    </div>

    <div class="form-card" id="form-card" style="display:none">
      <h2 id="form-title">Add a New Movie</h2>

      <input type="text" id="title" placeholder="Movie Title" />
      <input type="date" id="date" />
      <input type="number" id="rating" placeholder="Rating (1–5)" min="1" max="5" step="0.5" />
      <textarea id="review" placeholder="What did you think of the movie?"></textarea>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitMovie()">Save Movie</button>
        <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>

    <div id="movie-list"></div>
    <p id="no-movies">There are no movies currently saved. Add some now!</p>

  </div>

  <script src="/static/main.js"></script>
</body>

</html>
